<html onclick="if(!document.body.classList.contains('error'))window.location.href='/shutdown'">
    <head>
        <style type="text/css">
            html, body {
                height: 100%%;
                margin: 0;
            }
            body {
                font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
                background-color: %s;
                transition: background-color 0.4s ease;
                color: rgba(255,255,255,0.95);
                display: flex;
                align-items: center;
                justify-content: center;
            }
            body.error {
                background-color: #991b1b;
            }
            .count {
                font-size: 2.5em;
                font-weight: 700;
                line-height: 1;
                text-shadow: 0 2px 8px rgba(0,0,0,0.25);
            }
            html:active {
                background-color: orange;
            }
        </style>
    </head>
    <body><div class="count">%v</div></body>
    <script>
        setInterval(function() {
            fetch('/', {cache: 'no-store'}).then(function(r) {
                if (r.ok) {
                    r.text().then(function(html) {
                        var m = html.match(/<div class="count">([^<]+)<\/div>/);
                        if (m) {
                            document.querySelector('.count').textContent = m[1];
                            document.body.classList.remove('error');
                        }
                    });
                } else {
                    document.body.classList.add('error');
                }
            }).catch(function() {
                document.body.classList.add('error');
            });
        }, 2000);
    </script>
</html>
