import:
  - _default.yaml
  - defaults/app.yaml
  - deps/*

vars:
  stage: dev
  deps_stage: dev
  
terraform:
  auth:
    identities:
      plat-dev/terraform:
        default: true
  
components:
  terraform:
    app:
      metadata:
        # Override Terraform workspace
        terraform_workspace: "atmos-pro-with-ecs-{{ .atmos_stack }}-{{ .atmos_component }}"
